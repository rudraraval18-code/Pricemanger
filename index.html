<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Frank Anthony's — Price Ops</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fafaf9;
  --surface:#ffffff;
  --surface-2:#f5f5f4;
  --sidebar:#0c0a09;
  --sidebar-2:#1c1917;
  --sidebar-text:#a8a29e;
  --sidebar-text-strong:#fafaf9;
  --border:#e7e5e4;
  --border-2:#d6d3d1;
  --text:#0c0a09;
  --text-2:#44403c;
  --text-3:#78716c;
  --accent:#0f766e;
  --accent-2:#14b8a6;
  --amber:#d97706;
  --amber-bg:#fef3c7;
  --rose:#dc2626;
  --rose-bg:#fee2e2;
  --emerald:#059669;
  --emerald-bg:#d1fae5;
  --blue:#1d4ed8;
  --blue-bg:#dbeafe;
  --shadow-sm:0 1px 2px rgba(12,10,9,0.04);
  --shadow:0 4px 16px rgba(12,10,9,0.06);
  --radius:10px;
  --radius-lg:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
html,body{height:100%;}
body{
  font-family:'Manrope',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:14px;
  line-height:1.45;
}
button{font:inherit;cursor:pointer;border:0;background:none;color:inherit;}
input{font:inherit;}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums;}

/* APP SHELL ------------------------------------------------------- */
.app{
  display:grid;
  grid-template-columns:248px 1fr;
  min-height:100vh;
}
.sidebar{
  background:var(--sidebar);
  color:var(--sidebar-text);
  padding:20px 12px 16px;
  display:flex;flex-direction:column;
  gap:16px;
  position:sticky;top:0;height:100vh;
  border-right:1px solid #292524;
}
.brand{
  display:flex;align-items:center;gap:10px;
  padding:6px 10px 14px;
  border-bottom:1px solid #292524;
}
.brand-mark{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,var(--amber),#fbbf24);
  display:grid;place-items:center;
  font-weight:800;color:#0c0a09;font-size:13px;letter-spacing:0.02em;
}
.brand-text{display:flex;flex-direction:column;line-height:1.15;}
.brand-name{font-weight:700;color:var(--sidebar-text-strong);font-size:14px;}
.brand-sub{font-size:10.5px;color:#78716c;letter-spacing:0.06em;text-transform:uppercase;}

.nav{display:flex;flex-direction:column;gap:2px;flex:1;}
.nav-section{padding:14px 10px 6px;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#57534e;}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:7px;
  font-size:13.5px;font-weight:500;color:var(--sidebar-text);
  width:100%;text-align:left;
  transition:background 120ms ease, color 120ms ease;
}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--sidebar-text-strong);}
.nav-item.active{background:rgba(255,255,255,0.08);color:var(--sidebar-text-strong);}
.nav-item .ico{width:16px;height:16px;display:inline-block;}
.nav-badge{
  margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10.5px;
  background:var(--amber);color:#0c0a09;
  padding:1px 6px;border-radius:5px;font-weight:700;
}
.nav-count{
  margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;
  color:#57534e;
}

.sidebar-foot{
  border-top:1px solid #292524;padding:14px 10px 4px;
  font-size:11.5px;color:#78716c;line-height:1.5;
}
.sidebar-foot strong{color:var(--sidebar-text-strong);font-weight:600;}

/* MAIN ------------------------------------------------------------ */
.main{display:flex;flex-direction:column;min-width:0;}
.topbar{
  position:sticky;top:0;z-index:20;
  background:rgba(250,250,249,0.85);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:14px 28px;
  display:flex;align-items:center;gap:16px;
}
.crumbs{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-3);}
.crumbs strong{color:var(--text);font-weight:600;}
.search{
  margin-left:auto;
  display:flex;align-items:center;gap:8px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:7px 12px;width:320px;
  transition:border-color 120ms;
}
.search:focus-within{border-color:var(--text-2);}
.search input{flex:1;border:0;outline:0;background:transparent;font-size:13px;}
.search-icon{width:14px;height:14px;color:var(--text-3);}
.search-kbd{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-3);
  border:1px solid var(--border);padding:1px 5px;border-radius:4px;background:var(--bg);}

.content{padding:24px 28px 48px;display:flex;flex-direction:column;gap:20px;}

.page-head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;}
.page-title{font-size:22px;font-weight:700;letter-spacing:-0.01em;}
.page-sub{font-size:13px;color:var(--text-3);margin-top:4px;}

/* KPI ROW --------------------------------------------------------- */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.kpi{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:16px 18px;display:flex;flex-direction:column;gap:6px;
  position:relative;overflow:hidden;
}
.kpi-label{font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-3);font-weight:600;}
.kpi-value{font-family:'Manrope',sans-serif;font-size:28px;font-weight:700;letter-spacing:-0.02em;}
.kpi-foot{font-size:11.5px;color:var(--text-3);}
.kpi.accent{border-left:3px solid var(--amber);}
.kpi.success{border-left:3px solid var(--emerald);}
.kpi.warn{border-left:3px solid var(--rose);}

/* PANEL ----------------------------------------------------------- */
.panel{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;
}
.panel-head{
  padding:14px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
}
.panel-title{font-size:14px;font-weight:700;}
.panel-sub{font-size:12px;color:var(--text-3);}
.panel-actions{margin-left:auto;display:flex;align-items:center;gap:6px;}

/* CHIPS / FILTERS ------------------------------------------------- */
.chips{display:flex;flex-wrap:wrap;gap:6px;padding:12px 16px;border-bottom:1px solid var(--border);background:#fcfcfb;}
.chip{
  font-size:12.5px;font-weight:500;
  padding:6px 12px;border-radius:7px;
  border:1px solid var(--border);background:#fff;color:var(--text-2);
  transition:all 120ms;
}
.chip:hover{border-color:var(--border-2);}
.chip.active{background:var(--text);color:#fff;border-color:var(--text);}

.toolbar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);background:#fcfcfb;}
.toolbar .count{font-size:12.5px;color:var(--text-3);font-weight:500;}
.toolbar .right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.sort-select{
  border:1px solid var(--border);background:#fff;border-radius:7px;
  padding:5px 8px;font-size:12.5px;color:var(--text-2);
}

/* TABLE ----------------------------------------------------------- */
.table{width:100%;}
.tr{
  display:grid;
  grid-template-columns:36px minmax(0,2.6fr) 1fr 0.9fr 100px 100px 90px 90px 100px;
  gap:12px;align-items:center;
  padding:10px 16px;border-bottom:1px solid #f5f5f4;
}
.thead{
  background:#fafaf9;border-bottom:1px solid var(--border);
  font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--text-3);font-weight:700;padding-top:10px;padding-bottom:10px;
}
.tbody .tr:hover{background:#fafaf9;}
.tbody .tr:last-child{border-bottom:0;}

.t-num{text-align:right;font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;}
.t-cost{color:var(--text-2);}
.t-retail{color:var(--text);font-weight:600;}

.brand-circle{
  width:32px;height:32px;border-radius:8px;
  display:grid;place-items:center;color:#fff;
  font-size:11px;font-weight:700;letter-spacing:0.02em;
  font-family:'Manrope',sans-serif;
}
.t-name{font-weight:600;font-size:13.5px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.t-sub{font-size:11.5px;color:var(--text-3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.t-supplier{font-size:12px;color:var(--text-2);}

.markup-chip,.status-chip{
  display:inline-flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;
  padding:3px 7px;border-radius:5px;min-width:54px;
}
.mu-low{background:var(--rose-bg);color:#991b1b;}
.mu-mid{background:var(--amber-bg);color:#92400e;}
.mu-high{background:var(--emerald-bg);color:#065f46;}
.mu-prem{background:#ede9fe;color:#5b21b6;}

.status-chip{font-family:'Manrope',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:0.04em;}
.s-up{background:var(--rose-bg);color:#991b1b;}
.s-promo{background:var(--emerald-bg);color:#065f46;}
.s-stable{background:#f5f5f4;color:var(--text-3);}

/* PRICE CHANGE CARDS --------------------------------------------- */
.changes{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px;}
@media(max-width:1100px){.changes{grid-template-columns:1fr;}}
.change-card{
  border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;background:#fff;
  position:relative;
}
.change-card.up{border-left:3px solid var(--rose);}
.change-card.promo{border-left:3px solid var(--emerald);}
.change-top{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text-3);margin-bottom:8px;}
.change-name{font-weight:600;font-size:13.5px;margin-bottom:10px;}
.change-prices{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pb{
  background:#fafaf9;border-radius:8px;padding:9px 11px;
}
.pb-label{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-3);font-weight:600;}
.pb-row{display:flex;align-items:baseline;gap:6px;margin-top:5px;font-family:'JetBrains Mono',monospace;}
.pb-old{color:var(--text-3);text-decoration:line-through;font-size:12.5px;}
.pb-arrow{color:var(--text-3);font-size:11px;}
.pb-new{font-size:15px;font-weight:700;}
.pb-pct{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;margin-top:3px;}
.pct-up{color:var(--rose);}.pct-dn{color:var(--emerald);}

/* MARKUPS PAGE --------------------------------------------------- */
.markup-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
@media(max-width:900px){.markup-grid{grid-template-columns:1fr;}}
.markup-card{
  background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:18px;
}
.mc-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.mc-icon{
  width:38px;height:38px;border-radius:9px;
  display:grid;place-items:center;font-size:18px;
}
.mc-title{font-size:14px;font-weight:700;}
.mc-sub{font-size:11.5px;color:var(--text-3);}
.mc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.mc-stat-label{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-3);}
.mc-stat-value{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;margin-top:3px;}
.mc-bar-wrap{height:7px;background:#f5f5f4;border-radius:4px;overflow:hidden;}
.mc-bar{height:100%;background:linear-gradient(90deg,var(--emerald),var(--accent-2));}
.mc-foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:11px;color:var(--text-3);}

/* TWO COL --------------------------------------------------------- */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:1100px){.two-col{grid-template-columns:1fr;}}

/* MARKUP RANK LIST ----------------------------------------------- */
.rank-row{
  display:grid;grid-template-columns:24px 1fr auto auto auto;gap:12px;
  padding:9px 16px;border-bottom:1px solid #f5f5f4;align-items:center;
}
.rank-row:last-child{border-bottom:0;}
.rank-row:hover{background:#fafaf9;}
.rank-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-3);}
.rank-name{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rank-sub{font-size:11px;color:var(--text-3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rank-cost,.rank-retail{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-2);text-align:right;min-width:55px;}

/* SUPPLIER STRIP ------------------------------------------------- */
.supplier-row{
  display:grid;grid-template-columns:1fr 70px 70px 90px 1fr;gap:14px;
  padding:11px 16px;border-bottom:1px solid #f5f5f4;align-items:center;
}
.supplier-row:last-child{border-bottom:0;}
.supplier-row .sname{font-weight:600;font-size:13px;}
.supplier-row .smeta{font-size:11px;color:var(--text-3);}
.bar{height:6px;background:#f5f5f4;border-radius:3px;overflow:hidden;}
.bar > span{display:block;height:100%;background:var(--accent);}

/* EMPTY ----------------------------------------------------------- */
.empty{padding:40px 20px;text-align:center;color:var(--text-3);font-size:13px;}

/* BADGE / STATUS ROW HEADER -------------------------------------- */
.row-pill{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;font-weight:600;
  padding:3px 8px;border-radius:5px;color:var(--text-2);background:#f5f5f4;
}
.dot{width:6px;height:6px;border-radius:50%;}
.dot.ok{background:var(--emerald);}
.dot.warn{background:var(--amber);}
.dot.bad{background:var(--rose);}

/* RESPONSIVE ------------------------------------------------------ */
@media(max-width:980px){
  .app{grid-template-columns:1fr;}
  .sidebar{position:static;height:auto;flex-direction:row;flex-wrap:wrap;align-items:center;padding:12px 14px;gap:10px;}
  .sidebar-foot{display:none;}
  .nav{flex-direction:row;flex-wrap:wrap;flex:1;gap:4px;}
  .nav-section{display:none;}
  .nav-item{padding:7px 10px;font-size:12.5px;}
  .nav-count{display:none;}
  .brand{border:0;padding:0 8px 0 0;border-right:1px solid #292524;}
  .topbar{padding:12px 16px;}
  .search{width:100%;max-width:none;}
  .content{padding:16px;}
  .kpis{grid-template-columns:repeat(2,1fr);}
  .tr{
    grid-template-columns:32px minmax(0,2fr) 88px 88px 80px;
    font-size:12.5px;gap:8px;
  }
  .tr .col-cat,.tr .col-sup,.tr .col-margin,.tr .col-status{display:none;}
  .thead .col-cat,.thead .col-sup,.thead .col-margin,.thead .col-status{display:none;}
  .markup-grid{grid-template-columns:1fr;}
  .crumbs{font-size:12px;}
}
@media(max-width:640px){
  .topbar{flex-direction:column;align-items:stretch;}
  .crumbs{order:1;}
  .search{order:2;width:100%;}
  .kpis{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">FA</div>
      <div class="brand-text">
        <div class="brand-name">Frank Anthony's</div>
        <div class="brand-sub">Price Ops</div>
      </div>
    </div>
    <nav class="nav" id="nav">
      <div class="nav-section">Overview</div>
      <button class="nav-item" data-tab="dashboard"><span class="ico">📊</span> Dashboard <span class="nav-badge" id="alert-badge">0</span></button>
      <button class="nav-item" data-tab="markups"><span class="ico">📈</span> Markups</button>
      <div class="nav-section">Catalog</div>

      <button class="nav-item" data-tab="beer"><span class="ico">🍺</span> Beer <span class="nav-count" id="cnt-beer"></span></button>
      <button class="nav-item" data-tab="wine"><span class="ico">🍷</span> Wine &amp; Spirits <span class="nav-count" id="cnt-wine"></span></button>
      <button class="nav-item" data-tab="drinks"><span class="ico">🥤</span> Beverages <span class="nav-count" id="cnt-drinks"></span></button>
    </nav>
    <div class="sidebar-foot">
      <strong>Seaport Market</strong><br>
      <span id="foot-updated">Last updated —</span><br>
      <span id="foot-total">— products tracked</span>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <div class="crumbs">
        <span>Price Ops</span>
        <span style="opacity:0.4">/</span>
        <strong id="crumb-page">Dashboard</strong>
      </div>
      <div class="search">
        <span class="search-icon">🔍</span>
        <input id="search-input" placeholder="Search products, brands, suppliers…" autocomplete="off">
        <span class="search-kbd">⌘K</span>
      </div>
    </header>

    <main class="content" id="content"><!-- pages render here --></main>
  </div>
</div>

const $ = (id) => document.getElementById(id);
const fmt = (n) => (n == null || isNaN(n)) ? '—' : '$' + Number(n).toFixed(2);
const fmtPct = (n) => (n == null || isNaN(n)) ? '—' : (n >= 0 ? '+' : '') + n.toFixed(1) + '%';
const escHtml = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => (
  {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const initials = (s) => (s || '?').replace(/[^A-Za-z0-9]/g, ' ').trim().split(/\s+/).slice(0, 2).map(w => w[0]).join('').toUpperCase() || '?';
function brandColor(brand) {
  const palette = ['#0f766e','#0369a1','#7c3aed','#be123c','#b45309','#15803d','#1e40af','#7e22ce','#9a3412','#0891b2'];
  let h = 0;
  for (let i = 0; i < (brand || '').length; i++) h = (h * 31 + brand.charCodeAt(i)) & 0x7fffffff;
  return palette[h % palette.length];
}

// markup % = (retail - cost) / cost * 100   (used by purchasing/buyers)
// margin % = (retail - cost) / retail * 100 (used by accountants)
const markupPct = (cost, retail) => (cost > 0 && retail > 0) ? ((retail - cost) / cost) * 100 : null;
const marginPct = (cost, retail) => (cost > 0 && retail > 0) ? ((retail - cost) / retail) * 100 : null;
function muClass(p) {
  if (p == null) return '';
  if (p >= 120) return 'mu-prem';
  if (p >= 80)  return 'mu-high';
  if (p >= 50)  return 'mu-mid';
  return 'mu-low';
}

        <div class="pb">
          <div class="pb-label">Cost / Unit</div>

            <span class="pb-old">${it.prev_unit != null ? fmt(it.prev_unit) : '—'}</span>
            <span class="pb-arrow">→</span>
            <span class="pb-new">${fmt(it.unit)}</span>
          </div>

function changeCardPromo(it) {
  const savings = (it.unit && it.prev_unit) ? (it.unit - it.prev_unit) : 0;
  return `
    <div class="change-card promo">

}

// ── MARKUPS PAGE ────────────────────────────────────────────────
function renderMarkups() {
  // Build per-category aggregation
  const cats = [
    { key: 'grocery',   icon: '🛒', tint: '#fef3c7', name: 'Grocery',        items: DATA.grocery || [] },
    { key: 'beer',      icon: '🍺', tint: '#fde68a', name: 'Beer',           items: DATA.beer || [] },
    { key: 'wine',      icon: '🍷', tint: '#fbcfe8', name: 'Wine',           items: DATA.wine || [] },
    { key: 'liquor',    icon: '🥃', tint: '#fed7aa', name: 'Spirits',        items: DATA.liquor || [] },
    { key: 'beverages', icon: '🥤', tint: '#bae6fd', name: 'Beverages',      items: DATA.beverages || [] },
  ];

  const overallMu = (() => {
    const v = ALL.filter(i => i._mu != null);
    return v.length ? v.reduce((a, b) => a + b._mu, 0) / v.length : 0;
  })();
  const maxAvg = Math.max(...cats.map(c => avgMuOf(c.items)), 1);

  function avgMuOf(items) {
    const v = items.map(i => markupPct(i.unit, i.retail)).filter(x => x != null);
    return v.length ? v.reduce((a, b) => a + b, 0) / v.length : 0;
  }
  function medianMuOf(items) {
    const v = items.map(i => markupPct(i.unit, i.retail)).filter(x => x != null).sort((a, b) => a - b);
    if (!v.length) return 0;
    const m = Math.floor(v.length / 2);
    return v.length % 2 ? v[m] : (v[m - 1] + v[m]) / 2;
  }

  const catCards = cats.map(c => {
    const avg = avgMuOf(c.items);
    const med = medianMuOf(c.items);
    const cnt = c.items.length;
    const sumCost = c.items.reduce((s, i) => s + (i.unit || 0), 0);
    const sumRetail = c.items.reduce((s, i) => s + (i.retail || 0), 0);
    const aggMu = sumCost > 0 ? ((sumRetail - sumCost) / sumCost * 100) : 0;
    const barPct = Math.min(100, (avg / maxAvg) * 100);
    return `
      <div class="markup-card">
        <div class="mc-head">
          <div class="mc-icon" style="background:${c.tint}">${c.icon}</div>
          <div>
            <div class="mc-title">${c.name}</div>
            <div class="mc-sub">${cnt} items · aggregate markup ${aggMu.toFixed(1)}%</div>
          </div>
          <span class="markup-chip ${muClass(avg)}" style="margin-left:auto">${avg.toFixed(0)}%</span>
        </div>
        <div class="mc-stats">
          <div><div class="mc-stat-label">Avg markup</div><div class="mc-stat-value">${avg.toFixed(1)}%</div></div>
          <div><div class="mc-stat-label">Median</div><div class="mc-stat-value">${med.toFixed(1)}%</div></div>
          <div><div class="mc-stat-label">Items</div><div class="mc-stat-value">${cnt}</div></div>
        </div>
        <div class="mc-bar-wrap"><div class="mc-bar" style="width:${barPct}%"></div></div>
        <div class="mc-foot"><span>vs overall avg ${overallMu.toFixed(1)}%</span><span>${avg >= overallMu ? '↑ above' : '↓ below'} overall</span></div>
      </div>`;
  }).join('');

  // Top / bottom markup ranks
  const ranked = ALL.filter(i => i._mu != null).sort((a, b) => b._mu - a._mu);
  const top = ranked.slice(0, 10);
  const bottom = ranked.slice(-10).reverse();

  const rankRow = (it, idx) => `
    <div class="rank-row">
      <div class="rank-num">#${idx + 1}</div>
      <div style="min-width:0">
        <div class="rank-name">${escHtml(it.name)}</div>
        <div class="rank-sub">${escHtml(it.brand || '')} · ${escHtml(it.supplier || '')}</div>
      </div>
      <div class="rank-cost">${fmt(it.unit)}</div>
      <div class="rank-retail">${fmt(it.retail)}</div>
      <span class="markup-chip ${muClass(it._mu)}">${it._mu.toFixed(0)}%</span>
    </div>`;

  // Suppliers
  const supMap = new Map();
  ALL.forEach(it => {
    if (!it.supplier) return;
    const cur = supMap.get(it.supplier) || { items: [], cost: 0, retail: 0 };
    cur.items.push(it);
    cur.cost += it.unit || 0;
    cur.retail += it.retail || 0;
    supMap.set(it.supplier, cur);
  });
  const suppliers = [...supMap.entries()].map(([name, v]) => ({
    name, count: v.items.length,
    avgMu: v.items.filter(x => x._mu != null).reduce((a, b) => a + b._mu, 0) / Math.max(1, v.items.filter(x => x._mu != null).length),
    aggMu: v.cost > 0 ? ((v.retail - v.cost) / v.cost * 100) : 0,
  })).sort((a, b) => b.avgMu - a.avgMu);
  const supMaxMu = Math.max(...suppliers.map(s => s.avgMu), 1);

  $('content').innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">Markup Analysis</div>
        <div class="page-sub">How retail prices stack up against cost across categories and suppliers.</div>
      </div>
      <div class="kpi" style="min-width:220px">
        <div class="kpi-label">Catalog avg markup</div>
        <div class="kpi-value mono">${overallMu.toFixed(1)}%</div>
        <div class="kpi-foot">all ${ALL.length} items</div>
      </div>
    </div>
    <div class="markup-grid">${catCards}</div>
    <div class="two-col">
      <div class="panel">
        <div class="panel-head"><div><div class="panel-title">Top 10 — highest markup</div><div class="panel-sub">Best margin items in the catalog</div></div></div>
        ${top.length ? top.map(rankRow).join('') : '<div class="empty">No data</div>'}
      </div>
      <div class="panel">
        <div class="panel-head"><div><div class="panel-title">Bottom 10 — lowest markup</div><div class="panel-sub">Candidates to revisit retail or supplier</div></div></div>
        ${bottom.length ? bottom.map(rankRow).join('') : '<div class="empty">No data</div>'}
      </div>
    </div>
    <div class="panel">
      <div class="panel-head"><div><div class="panel-title">Markup by supplier</div><div class="panel-sub">${suppliers.length} suppliers</div></div></div>
      ${suppliers.map(s => `
        <div class="supplier-row">
          <div><div class="sname">${escHtml(s.name)}</div><div class="smeta">${s.count} items</div></div>
          <div class="t-num">${s.aggMu.toFixed(0)}%</div>
          <div class="t-num"><span class="markup-chip ${muClass(s.avgMu)}">${s.avgMu.toFixed(0)}%</span></div>
          <div class="smeta">avg markup</div>
          <div class="bar"><span style="width:${(s.avgMu / supMaxMu * 100).toFixed(1)}%"></span></div>
        </div>`).join('')}
    </div>`;
}

// ── CATEGORY PAGE ──────────────────────────────────────────────
const filterState = { grocery: 'All', beer: 'All', wine: 'All', drinks: 'All', wineType: 'wine' };
const sortState = { grocery: 'name-asc', beer: 'name-asc', wine: 'name-asc', drinks: 'name-asc' };

function renderCategory(key, items, filterKeys) {
  const filter = filterState[key];
  const filterKey = filterKeys[0];
  const allFilters = ['All', ...new Set(items.map(i => i[filterKey]).filter(Boolean))];
  const filtered = filter === 'All' ? items : items.filter(i => i[filterKey] === filter);
  const sorted = sortItems(filtered, sortState[key]);

  $('content').innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">${TAB_LABELS[key]}</div>
        <div class="page-sub">${items.length} items · cost, retail and markup at a glance</div>
      </div>
    </div>
    <div class="panel">
      <div class="chips">
        ${allFilters.map(f => `<button class="chip ${f === filter ? 'active' : ''}" data-filter="${escHtml(f)}">${escHtml(f)}</button>`).join('')}
      </div>
      <div class="toolbar">
        <span class="count">Showing <strong>${sorted.length}</strong> of ${items.length}</span>
        <div class="right">
          <label class="count">Sort:</label>
          <select class="sort-select" id="sort-${key}">
            <option value="name-asc">Name (A→Z)</option>
            <option value="markup-desc">Markup (high→low)</option>
            <option value="markup-asc">Markup (low→high)</option>
            <option value="cost-desc">Cost (high→low)</option>
            <option value="cost-asc">Cost (low→high)</option>
            <option value="retail-desc">Retail (high→low)</option>
          </select>
        </div>
      </div>
      ${tableMarkup(sorted)}
    </div>`;

  $('sort-' + key).value = sortState[key];
  $('sort-' + key).addEventListener('change', (e) => {
    sortState[key] = e.target.value;
    renderCategory(key, items, filterKeys);
  });
  $('content').querySelectorAll('.chip[data-filter]').forEach(c => c.addEventListener('click', () => {
    filterState[key] = c.dataset.filter;
    renderCategory(key, items, filterKeys);
  }));
}

function renderWine() {
  const wineType = filterState.wineType;
  const items = wineType === 'wine' ? (DATA.wine || []) : (DATA.liquor || []);
  const filter = filterState.wine;
  const allFilters = ['All', ...new Set(items.map(i => i.category).filter(Boolean))];
  const filtered = filter === 'All' ? items : items.filter(i => i.category === filter);
  const sorted = sortItems(filtered, sortState.wine);

  $('content').innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">Wine &amp; Spirits</div>
        <div class="page-sub">${(DATA.wine || []).length} wines · ${(DATA.liquor || []).length} spirits</div>
      </div>
    </div>
    <div class="panel">
      <div class="chips" style="border-bottom:1px solid var(--border);background:#fff;">
        <button class="chip ${wineType === 'wine' ? 'active' : ''}" data-wt="wine">Wine</button>
        <button class="chip ${wineType === 'liquor' ? 'active' : ''}" data-wt="liquor">Spirits</button>
      </div>
      <div class="chips">
        ${allFilters.slice(0, 12).map(f => `<button class="chip ${f === filter ? 'active' : ''}" data-filter="${escHtml(f)}">${escHtml(f)}</button>`).join('')}
      </div>
      <div class="toolbar">
        <span class="count">Showing <strong>${sorted.length}</strong> of ${items.length}</span>
        <div class="right">
          <label class="count">Sort:</label>
          <select class="sort-select" id="sort-wine">
            <option value="name-asc">Name (A→Z)</option>
            <option value="markup-desc">Markup (high→low)</option>
            <option value="markup-asc">Markup (low→high)</option>
            <option value="cost-desc">Cost (high→low)</option>
            <option value="cost-asc">Cost (low→high)</option>
            <option value="retail-desc">Retail (high→low)</option>
          </select>
        </div>
      </div>
      ${tableMarkup(sorted)}
    </div>`;

  $('sort-wine').value = sortState.wine;
  $('sort-wine').addEventListener('change', (e) => { sortState.wine = e.target.value; renderWine(); });
  $('content').querySelectorAll('.chip[data-wt]').forEach(c => c.addEventListener('click', () => {
    filterState.wineType = c.dataset.wt; filterState.wine = 'All'; renderWine();
  }));
  $('content').querySelectorAll('.chip[data-filter]').forEach(c => c.addEventListener('click', () => {
    filterState.wine = c.dataset.filter; renderWine();
  }));
}

function sortItems(items, mode) {
  const arr = items.slice();
  switch (mode) {
    case 'name-asc':     arr.sort((a, b) => (a.name || '').localeCompare(b.name || '')); break;
    case 'cost-desc':    arr.sort((a, b) => (b.unit || 0) - (a.unit || 0)); break;
    case 'cost-asc':     arr.sort((a, b) => (a.unit || 0) - (b.unit || 0)); break;
    case 'retail-desc':  arr.sort((a, b) => (b.retail || 0) - (a.retail || 0)); break;
    case 'markup-desc':  arr.sort((a, b) => (markupPct(b.unit, b.retail) || 0) - (markupPct(a.unit, a.retail) || 0)); break;
    case 'markup-asc':   arr.sort((a, b) => (markupPct(a.unit, a.retail) || Infinity) - (markupPct(b.unit, b.retail) || Infinity)); break;
  }
  return arr;
}

function tableMarkup(items) {
  if (!items.length) return '<div class="empty">No items match the current filter.</div>';
  const head = `
    <div class="tr thead">
      <div></div>
      <div>Item</div>
      <div class="col-cat">Category</div>
      <div class="col-sup">Supplier</div>
      <div class="t-num">Cost</div>
      <div class="t-num">Retail</div>
      <div class="t-num">Markup</div>
      <div class="t-num col-margin">Margin</div>
      <div class="col-status t-num">Status</div>
    </div>`;
  const rows = items.map(it => {
    const mu = markupPct(it.unit, it.retail);
    const mg = marginPct(it.unit, it.retail);
    const cat = it.category || it.size || it.sell_as || '—';
    const status = (it.status || 'Stable');
    const sCls = status.includes('↑') ? 's-up' : status.includes('%') ? 's-promo' : 's-stable';
    const color = brandColor(it.brand || it.name);
    return `
      <div class="tr">
        <div class="brand-circle" style="background:${color}">${initials(it.brand || it.name)}</div>
        <div style="min-width:0">
          <div class="t-name">${escHtml(it.name)}</div>
          <div class="t-sub">${escHtml(it.brand || '')}${it.size ? ' · ' + escHtml(it.size) : ''}</div>
        </div>
        <div class="col-cat t-supplier">${escHtml(cat)}</div>
        <div class="col-sup t-supplier">${escHtml(it.supplier || '—')}</div>
        <div class="t-num t-cost">${fmt(it.unit)}</div>
        <div class="t-num t-retail">${fmt(it.retail)}</div>
        <div class="t-num"><span class="markup-chip ${muClass(mu)}">${mu != null ? mu.toFixed(0) + '%' : '—'}</span></div>
        <div class="t-num col-margin t-supplier">${mg != null ? mg.toFixed(0) + '%' : '—'}</div>
        <div class="col-status"><span class="status-chip ${sCls}">${status === 'Stable' ? 'Stable' : (status.includes('↑') ? '↑ Up' : '% Promo')}</span></div>
      </div>`;
  }).join('');
  return `<div class="table"><div class="tbody">${head}${rows}</div></div>`;
}

// ── SEARCH RESULTS ─────────────────────────────────────────────
function renderSearch() {
  const q = searchQuery;
  const results = ALL.filter(i =>
    (i.name + ' ' + (i.brand || '') + ' ' + (i.supplier || '') + ' ' + (i.category || '')).toLowerCase().includes(q)
  ).slice(0, 200);
  $('crumb-page').textContent = 'Search';
  $('content').innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">Search results for "${escHtml(q)}"</div>
        <div class="page-sub">${results.length} match${results.length === 1 ? '' : 'es'} across all categories</div>
      </div>
    </div>
    <div class="panel">${tableMarkup(results)}</div>`;
}
