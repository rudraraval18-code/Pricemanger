<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Frank Anthony's — Price Board</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f2edff;
  --bg2: #e8edff;
  --purple: #6d28d9;
  --purple-light: #7c3aed;
  --purple-dark: #1e1040;
  --orange: #f97316;
  --orange-dark: #ea580c;
  --red: #ef4444;
  --green: #10b981;
  --gold: #f59e0b;
  --card: #ffffff;
  --card-shadow: 0 2px 16px rgba(109,40,217,0.08);
  --text: #1a1a2e;
  --text2: #64748b;
  --text3: #94a3b8;
  --radius: 18px;
  --tab-h: 72px;
  --header-h: 64px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'DM Sans',sans-serif;
  background:linear-gradient(140deg,#ede9fe 0%,#e0e8ff 40%,#f0f4ff 100%);
  color:var(--text);
}

/* ── HEADER ── */
#header{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:var(--header-h);
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(109,40,217,0.08);
  display:flex;align-items:center;padding:0 16px;gap:12px;
}
.logo{
  width:36px;height:36px;border-radius:10px;
  background:var(--purple-dark);
  display:grid;place-items:center;flex-shrink:0;
  font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:#fff;
}
.store-info{flex:1;min-width:0;}
.store-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);line-height:1;}
.store-sub{font-size:10px;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-top:2px;}
.search-btn{
  width:36px;height:36px;border-radius:10px;border:1px solid rgba(109,40,217,0.15);
  background:#fff;display:grid;place-items:center;cursor:pointer;color:var(--purple);
  flex-shrink:0;
}

/* ── SEARCH OVERLAY ── */
#search-overlay{
  position:fixed;inset:0;z-index:300;
  background:rgba(30,16,64,0.6);backdrop-filter:blur(8px);
  display:none;align-items:flex-start;padding-top:16px;
}
#search-overlay.open{display:flex;}
.search-box{
  margin:0 16px;width:100%;max-width:600px;
  background:#fff;border-radius:16px;overflow:hidden;
  box-shadow:0 24px 64px rgba(0,0,0,0.3);
}
.search-inner{display:flex;align-items:center;padding:14px 16px;gap:12px;border-bottom:1px solid #f1f5f9;}
.search-inner svg{flex-shrink:0;color:var(--purple);}
#search-input{
  flex:1;border:none;outline:none;font-family:'DM Sans',sans-serif;
  font-size:16px;color:var(--text);background:transparent;
}
#search-input::placeholder{color:var(--text3);}
.search-close{
  cursor:pointer;padding:4px;color:var(--text3);background:none;border:none;
  font-size:20px;line-height:1;
}
#search-results{max-height:60vh;overflow-y:auto;padding:8px;}
.sr-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 10px;border-radius:10px;cursor:pointer;gap:8px;
}
.sr-item:hover{background:#f8f7ff;}
.sr-left{flex:1;min-width:0;}
.sr-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sr-meta{font-size:11px;color:var(--text3);margin-top:2px;}
.sr-retail{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--orange);flex-shrink:0;}

/* ── CONTENT ── */
#content{
  position:fixed;
  top:var(--header-h);bottom:var(--tab-h);
  left:0;right:0;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.tab-pane{display:none;padding:16px 16px 8px;}
.tab-pane.active{display:block;}

/* ── HERO CARD ── */
.hero-card{
  background:var(--purple-dark);
  border-radius:24px;padding:20px;margin-bottom:16px;
  position:relative;overflow:hidden;
}
.hero-card::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:180px;height:180px;border-radius:50%;
  background:rgba(124,58,237,0.3);
}
.hero-card::after{
  content:'';position:absolute;bottom:-60px;left:-30px;
  width:160px;height:160px;border-radius:50%;
  background:rgba(249,115,22,0.15);
}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;position:relative;z-index:1;}
.hero-label{
  font-size:9px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;
  color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.1);
  border-radius:20px;padding:4px 10px;display:inline-block;margin-bottom:6px;
}
.hero-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#fff;line-height:1.1;}
.hero-count{text-align:right;}
.hero-num{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;color:var(--orange);line-height:1;}
.hero-num-label{font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.1em;}
.hero-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;position:relative;z-index:1;}
.hero-stat{background:rgba(255,255,255,0.08);border-radius:12px;padding:10px 12px;}
.hero-stat-label{font-size:9px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;}
.hero-stat-val{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#fff;}

/* ── SECTION TITLE ── */
.section-title{
  display:flex;align-items:center;justify-content:space-between;
  margin:20px 0 10px;
}
.section-title h2{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--text);}
.section-count{
  font-size:11px;font-weight:600;color:var(--purple);
  background:rgba(109,40,217,0.1);border-radius:20px;padding:3px 9px;
}

/* ── CHANGE CARD ── */
.change-card{
  background:var(--card);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:10px;
  box-shadow:var(--card-shadow);
  border-left:4px solid var(--red);
}
.change-card.promo{border-left-color:var(--green);}
.change-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.supplier-chip{
  font-size:10px;font-weight:600;letter-spacing:0.06em;
  padding:3px 8px;border-radius:20px;
  background:rgba(109,40,217,0.1);color:var(--purple);
}
.supplier-chip.rf{background:rgba(249,115,22,0.1);color:var(--orange-dark);}
.change-date{font-size:10px;color:var(--text3);margin-left:auto;}
.change-type{
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;
}
.change-type.up{background:rgba(239,68,68,0.1);color:var(--red);}
.change-type.promo{background:rgba(16,185,129,0.1);color:var(--green);}
.change-name{font-weight:600;font-size:14px;color:var(--text);margin-bottom:10px;line-height:1.3;}
.change-prices{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.price-block{background:#f8f7ff;border-radius:10px;padding:10px 12px;}
.price-block.retail-block{background:rgba(249,115,22,0.06);}
.pb-label{font-size:9px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:6px;}
.pb-row{display:flex;align-items:center;gap:8px;}
.pb-old{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text3);text-decoration:line-through;}
.pb-arrow{font-size:11px;color:var(--text3);}
.pb-new{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;}
.pb-new.cost{color:var(--text);}
.pb-new.retail{color:var(--orange);}
.pb-pct{
  font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px;
  background:rgba(239,68,68,0.12);color:var(--red);margin-top:4px;display:inline-block;
}
.pb-pct.down{background:rgba(16,185,129,0.12);color:var(--green);}

/* ── PRODUCT LIST ── */
.cat-scroll{
  display:flex;gap:8px;overflow-x:auto;padding:0 0 8px;margin-bottom:12px;
  scrollbar-width:none;
}
.cat-scroll::-webkit-scrollbar{display:none;}
.cat-chip{
  flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:500;
  background:#fff;border:1.5px solid rgba(109,40,217,0.15);color:var(--text2);
  cursor:pointer;white-space:nowrap;transition:all 0.15s;
}
.cat-chip.active{background:var(--purple);border-color:var(--purple);color:#fff;}

.prod-list{display:flex;flex-direction:column;gap:8px;}
.prod-row{
  background:var(--card);border-radius:14px;padding:12px 14px;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 1px 8px rgba(109,40,217,0.06);
  position:relative;
}
.prod-row.price-up{border-left:3px solid var(--red);}
.prod-row.promo{border-left:3px solid var(--green);}
.brand-circle{
  width:40px;height:40px;border-radius:12px;
  display:grid;place-items:center;flex-shrink:0;
  font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:#fff;
}
.prod-info{flex:1;min-width:0;}
.prod-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.25;margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prod-meta{font-size:11px;color:var(--text3);}
.prod-meta .sup{color:var(--purple);font-weight:500;}
.prod-prices{text-align:right;flex-shrink:0;}
.prod-cost{font-size:11px;color:var(--text3);margin-bottom:1px;}
.prod-retail{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--orange);}
.status-pip{
  position:absolute;top:8px;right:8px;
  width:6px;height:6px;border-radius:50%;
}
.status-pip.up{background:var(--red);}
.status-pip.promo{background:var(--green);}

/* ── BOTTOM TABS ── */
#tab-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  height:var(--tab-h);
  background:rgba(255,255,255,0.96);
  backdrop-filter:blur(16px);
  border-top:1px solid rgba(109,40,217,0.08);
  display:flex;align-items:stretch;
  padding-bottom:env(safe-area-inset-bottom);
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;cursor:pointer;border:none;background:none;
  padding:0;color:var(--text3);transition:color 0.2s;
  position:relative;
}
.tab-btn.active{color:var(--purple);}
.tab-icon{font-size:22px;line-height:1;}
.tab-label{font-size:10px;font-weight:600;letter-spacing:0.02em;}
.tab-active-bar{
  position:absolute;top:0;left:25%;right:25%;
  height:3px;border-radius:0 0 3px 3px;
  background:var(--purple);
  display:none;
}
.tab-btn.active .tab-active-bar{display:block;}
.tab-badge{
  position:absolute;top:6px;right:calc(50% - 18px);
  width:16px;height:16px;border-radius:50%;
  background:var(--red);color:#fff;
  font-size:9px;font-weight:700;
  display:grid;place-items:center;
}

/* ── EMPTY STATE ── */
.empty{
  text-align:center;padding:48px 20px;color:var(--text3);
}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-text{font-size:14px;}

/* ── LOADING ── */
.spinner{display:none;}

/* ── RESPONSIVE ── */
@media(min-width:600px){
  .prod-list{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .change-prices{grid-template-columns:1fr 1fr;}
}
@media(min-width:900px){
  .prod-list{grid-template-columns:1fr 1fr 1fr;}
  #content{max-width:900px;left:50%;transform:translateX(-50%);}
  #header{max-width:900px;left:50%;transform:translateX(-50%);}
  #tab-bar{max-width:900px;left:50%;transform:translateX(-50%);}
}
</style>
</head>

<div id="content">

  <!-- GROCERY TAB -->

    <div class="prod-list" id="grocery-list"></div>
  </div>

  <!-- BEER TAB -->
  <div id="pane-beer" class="tab-pane">

    <div class="prod-list" id="beer-list"></div>
  </div>

  <!-- WINE & SPIRITS TAB -->
  <div id="pane-wine" class="tab-pane">
    <div style="display:flex;gap:8px;margin-bottom:12px;" id="wine-type-tabs">

      <button class="cat-chip" onclick="setWineType('liquor',this)">🥃 Spirits</button>
    </div>
    <div class="cat-scroll" id="wine-cats"></div>
    <div class="prod-list" id="wine-list"></div>
  </div>

  <!-- BEVERAGES TAB -->
  <div id="pane-drinks" class="tab-pane">
    <div class="cat-scroll" id="bev-cats"></div>
    <div class="prod-list" id="bev-list"></div>
  </div>

</div>

<!-- BOTTOM TAB BAR -->
<div id="tab-bar">
  <button class="tab-btn active" onclick="switchTab('alerts',this)">
    <div class="tab-active-bar"></div>
    <div class="tab-icon">🔔</div>
    <div class="tab-label">Alerts</div>
    <div class="tab-badge" id="alert-badge">0</div>
  </button>
  <button class="tab-btn" onclick="switchTab('grocery',this)">
    <div class="tab-active-bar"></div>
    <div class="tab-icon">🛒</div>
    <div class="tab-label">Grocery</div>
  </button>
  <button class="tab-btn" onclick="switchTab('beer',this)">
    <div class="tab-active-bar"></div>
    <div class="tab-icon">🍺</div>
    <div class="tab-label">Beer</div>
  </button>
  <button class="tab-btn" onclick="switchTab('wine',this)">
    <div class="tab-active-bar"></div>
    <div class="tab-icon">🍷</div>
    <div class="tab-label">Wine & Spirits</div>
  </button>
  <button class="tab-btn" onclick="switchTab('drinks',this)">
    <div class="tab-active-bar"></div>
    <div class="tab-icon">🥤</div>
    <div class="tab-label">Drinks</div>
  </button>
</div>

    'Mountain':'#1d4ed8','GoodMood':'#a855f7','Moët':'#b45309','Veuve':'#c09a2a',
    'Tito's':'#1e40af','Don':'#7c3aed','Casamigos':'#991b1b','Jameson':'#15803d',
    'Bulleit':'#c2410c','Woodford':'#854d0e','Grey':'#374151','Patron':'#b45309',
    'Bud':'#1d4ed8','Coors':'#2d9e5f','Michelob':'#b45309','Stella':'#1e3a5f',
    'Corona':'#0369a1','Modelo':'#c2410c','Fiddlehead':'#166534','Night':'#1f2937',
    'Allagash':'#1d4ed8','Jack's':'#374151','Citizen':'#7c3aed',
    'Barq's':'#dc2626','Coca-Cola':'#dc2626','Coke':'#dc2626','Sprite':'#16a34a',
    'Monster':'#16a34a','Celsius':'#0891b2','Minute':'#f59e0b','Smartwater':'#0066cc',
    'Dasani':'#0066cc','Body':'#059669','Vitaminwater':'#7c3aed',
  };
  for (const [k,v] of Object.entries(MAP)) {
    if (brand && brand.startsWith(k)) return v;
  }
  // Hash fallback
  let h = 0;
  for (let i=0; i < (brand||'').length; i++) h = (h*31 + brand.charCodeAt(i)) & 0xffffffff;
  const colors = ['#6d28d9','#0891b2','#dc2626','#16a34a','#f97316','#0066cc','#b45309','#4c1d95'];
  return colors[Math.abs(h) % colors.length];
}

function fmt(n){return n==null?'—':'$'+Number(n).toFixed(2);}
function pct(old_v,new_v){
  if(!old_v||!new_v) return '';
  const p = ((new_v-old_v)/old_v*100);
  return (p>0?'+':'')+p.toFixed(1)+'%';
}
function initials(s){ return (s||'?').replace(/[^A-Za-z0-9]/g,' ').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase()||'?'; }

  <div style="margin-top:10px;padding:9px 12px;background:linear-gradient(90deg,rgba(16,185,129,0.12),rgba(16,185,129,0.04));border-radius:10px;display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:11px;color:var(--text2)">⚡ Extra margin during promo:</span>
    <span style="font-family:'Syne',sans-serif;font-weight:800;color:var(--green);font-size:17px">+${fmt(unitSavings)}<span style="font-size:10px;font-weight:500;margin-left:4px;opacity:0.8">per unit (${pctSavings}% extra)</span></span>
  </div>
</div>`;
    });
  }

  document.getElementById('changes-list').innerHTML = html;
}

// ── PRODUCT LIST RENDERER ─────────────────────────────────
function productRow(item, showStatus=true){
  const color = brandColor(item.brand);
  const ini = initials(item.brand||item.name);
  const statusClass = item.status&&item.status.includes('↑')?'price-up':item.status&&item.status.includes('%')?'promo':'';
  const pip = statusClass?`<div class="status-pip ${statusClass==='price-up'?'up':'promo'}"></div>`:'';
  const cat = item.category||item.size||item.sell_as||'';
  const sup = item.supplier||'';
  return `
<div class="prod-row ${statusClass}">
  ${pip}
  <div class="brand-circle" style="background:${color}">${ini}</div>
  <div class="prod-info">
    <div class="prod-name">${item.name}</div>
    <div class="prod-meta">${cat?cat+' · ':''}<span class="sup">${sup}</span></div>
  </div>
  <div class="prod-prices">
    <div class="prod-cost">Cost ${fmt(item.unit)}</div>
    <div class="prod-retail">${fmt(item.retail)}</div>
  </div>
</div>`;
}

// ── GROCERY TAB ───────────────────────────────────────────
let groceryCat = 'All';
function renderGrocery(cat){
  groceryCat = cat||groceryCat;
  const items = DATA.grocery;
  // Get categories from supplier field
  const cats = ['All','KeHE','Rainforest'];
  let catHtml = cats.map(c=>`<div class="cat-chip ${groceryCat===c?'active':''}" onclick="renderGrocery('${c}')">${c}</div>`).join('');
  document.getElementById('grocery-cats').innerHTML = catHtml;
  const filtered = groceryCat==='All'?items:items.filter(i=>i.supplier===groceryCat);
  if(!filtered.length){ document.getElementById('grocery-list').innerHTML='<div class="empty"><div class="empty-icon">🛒</div><div class="empty-text">No items</div></div>'; return; }
  document.getElementById('grocery-list').innerHTML = filtered.map(i=>productRow(i)).join('');
}

// ── BEER TAB ─────────────────────────────────────────────
let beerCat = 'All';
function renderBeer(cat){
  beerCat = cat||beerCat;
  const items = DATA.beer;
  const cats = ['All',...new Set(items.map(i=>i.sell_as||'').filter(Boolean))];
  let catHtml = cats.slice(0,6).map(c=>`<div class="cat-chip ${beerCat===c?'active':''}" onclick="renderBeer('${c}')">${c}</div>`).join('');
  document.getElementById('beer-cats').innerHTML = catHtml;
  const filtered = beerCat==='All'?items:items.filter(i=>i.sell_as===beerCat);
  document.getElementById('beer-list').innerHTML = filtered.map(i=>{
    const color = brandColor(i.brand);
    const ini = initials(i.brand||i.name);
    return `<div class="prod-row">
      <div class="brand-circle" style="background:${color}">${ini}</div>
      <div class="prod-info">
        <div class="prod-name">${i.name}</div>
        <div class="prod-meta">${i.size} · <span class="sup">${i.sell_as||''}</span></div>
      </div>
      <div class="prod-prices">
        <div class="prod-cost">Cost ${fmt(i.unit)}</div>
        <div class="prod-retail">${fmt(i.retail)}</div>
      </div>
    </div>`;
  }).join('');
}

// ── WINE/SPIRITS TAB ─────────────────────────────────────
let wineType = 'wine';
let wineCat = 'All';
function setWineType(type, el){
  wineType = type;
  document.querySelectorAll('#wine-type-tabs .cat-chip').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  wineCat = 'All';
  renderWine();
}
function renderWine(cat){
  wineCat = cat||wineCat;
  const items = wineType==='wine'?DATA.wine:DATA.liquor;
  const cats = ['All',...new Set(items.map(i=>i.category||'').filter(Boolean))].slice(0,8);
  let catHtml = cats.map(c=>`<div class="cat-chip ${wineCat===c?'active':''}" onclick="renderWine('${c}')">${c}</div>`).join('');
  document.getElementById('wine-cats').innerHTML = catHtml;
  const filtered = wineCat==='All'?items:items.filter(i=>i.category===wineCat);
  document.getElementById('wine-list').innerHTML = filtered.map(i=>{
    const color = brandColor(i.brand);
    const ini = initials(i.brand||i.name);
    return `<div class="prod-row">
      <div class="brand-circle" style="background:${color}">${ini}</div>
      <div class="prod-info">
        <div class="prod-name">${i.name}</div>
        <div class="prod-meta">${i.category||''} ${i.size?'· '+i.size:''} · <span class="sup">${i.supplier||''}</span></div>
      </div>
      <div class="prod-prices">
        <div class="prod-cost">Cost ${fmt(i.unit)}</div>
        <div class="prod-retail">${fmt(i.retail)}</div>
      </div>
    </div>`;
  }).join('');
}

// ── BEVERAGES TAB ────────────────────────────────────────
let bevCat = 'All';
function renderBev(cat){
  bevCat = cat||bevCat;
  const items = DATA.beverages;
  const cats = ['All',...new Set(items.map(i=>i.category||'').filter(Boolean))].slice(0,8);
  let catHtml = cats.map(c=>`<div class="cat-chip ${bevCat===c?'active':''}" onclick="renderBev('${c}')">${c}</div>`).join('');
  document.getElementById('bev-cats').innerHTML = catHtml;
  const filtered = bevCat==='All'?items:items.filter(i=>i.category===bevCat);
  document.getElementById('bev-list').innerHTML = filtered.map(i=>productRow(i)).join('');
}

// ── SEARCH ───────────────────────────────────────────────
const ALL_ITEMS = [
  ...DATA.grocery.map(i=>({...i,tab:'grocery'})),
  ...DATA.wine.map(i=>({...i,tab:'wine'})),
  ...DATA.liquor.map(i=>({...i,tab:'spirits'})),
  ...DATA.beer.map(i=>({...i,tab:'beer'})),
  ...DATA.beverages.map(i=>({...i,tab:'drinks'})),
];
function openSearch(){
  document.getElementById('search-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('search-input').focus(),100);
}
function closeSearch(){
  document.getElementById('search-overlay').classList.remove('open');
  document.getElementById('search-input').value='';
  document.getElementById('search-results').innerHTML='';
}
function closeSearchIfBg(e){ if(e.target===document.getElementById('search-overlay')) closeSearch(); }
function doSearch(q){
  if(!q||q.length<2){ document.getElementById('search-results').innerHTML=''; return; }
  const ql = q.toLowerCase();
  const results = ALL_ITEMS.filter(i=>(i.name+' '+(i.brand||'')+' '+(i.supplier||'')).toLowerCase().includes(ql)).slice(0,30);
  if(!results.length){ document.getElementById('search-results').innerHTML='<div style="padding:16px;text-align:center;color:var(--text3);font-size:13px">No products found</div>'; return; }
  document.getElementById('search-results').innerHTML = results.map(i=>`
<div class="sr-item" onclick="closeSearch()">
  <div class="sr-left">
    <div class="sr-name">${i.name}</div>
    <div class="sr-meta">${i.supplier||''} · ${i.tab} ${i.status&&i.status!=='Stable'?'· <span style="color:var(--red)">'+i.status+'</span>':''}</div>
  </div>
  <div class="sr-retail">${fmt(i.retail)}</div>
</div>`).join('');
}

// ── TAB SWITCHING ─────────────────────────────────────────
function switchTab(tab, btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pane-'+tab).classList.add('active');
  document.getElementById('content').scrollTop = 0;
  if(tab==='grocery') renderGrocery();
  if(tab==='beer') renderBeer();
  if(tab==='wine') renderWine();
  if(tab==='drinks') renderBev();
}

// ── INIT ─────────────────────────────────────────────────
renderAlerts();
